[Options]
; UndoLimit=0으로 설정하면 최대 100번까지 무제한으로 동작. R(리셋)시 스택도 함께 초기화.
; Set UndoLimit=0 for unlimited undo (up to 100). The stack is also cleared on R (Reset).
UndoLimit=10

[Category]
; 카테고리는 8개가 기본이며 줄이거나 늘릴 수 없음.
; The number of categories is fixed at 8 and cannot be reduced or increased.
01=Symbol
02=Math
03=Parentheses
04=Word
05=Sentence
06=Letter
07=Idiom
08=Personal

[01]
; 스니펫 사이즈는 1, 2, 3, 4 네 가지가 지원 (기본값은 1). 이외의 숫자를 쓰거나 비워두면 기본값으로 표시.
; Size supports four values: 1, 2, 3, 4 (default is 1). Any other value or empty defaults to 1.
; Size 1, 2는 버튼 중앙 정렬 / Size 3, 4는 왼쪽 정렬.
; Size 1, 2: center-aligned buttons / Size 3, 4: left-aligned.
; Size 1은 64개, Size 2는 32개, Size 3은 16개, Size 4는 8개까지 입력 가능. 초과되는 부분은 무시됨.
; Max items: Size 1=64, Size 2=32, Size 3=16, Size 4=8. Entries beyond the limit are ignored.
; 더 입력이 필요하면 프로그램을 추가 실행.
; Launch additional instances of the program if more entries are needed.
